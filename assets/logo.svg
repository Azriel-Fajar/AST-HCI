      <stop offset="0" stop-color="#d9b25e"/>
      <stop offset="1" stop-color="#c9a14a"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&amp;family=Inter:wght@500&amp;display=swap');
    </style>
  </defs>

  <!-- Emblem -->
  <g transform="translate(0 -20) scale(0.55)">
    <g stroke="#c9a14a" stroke-width="2.5" stroke-linecap="round" fill="none">
      <g transform="translate(100 100)">
